apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rtdt.fullname" . }}-nginx-config
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
data:
  default.conf: |
    upstream kit_http {
      server {{ include "rtdt.fullname" . }}-kit:{{ .Values.kit.ports.signaling }};
    }

    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # SPA fallback
      location / {
        try_files $uri /index.html;
      }

      # Do not cache the HTML shell
      location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires -1;
      }

      # HTTP API proxy to Kit
      location /api/ {
        proxy_pass http://kit_http/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # WebSocket proxy to Kit
      location /ws/ {
        proxy_pass http://kit_http/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
      }
    }
