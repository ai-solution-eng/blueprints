apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ include "rtdt.fullname" . }}-gateway
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
spec:
  selector:
    istio: ingressgateway
  servers:
  - hosts:
    - '*'
    port:
      name: http
      number: 80
      protocol: HTTP
