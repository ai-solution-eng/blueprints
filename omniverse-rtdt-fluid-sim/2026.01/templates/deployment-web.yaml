apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rtdt.fullname" . }}-web
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
    {{- include "rtdt.web.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "rtdt.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when nginx config changes
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
      labels:
        {{- include "rtdt.labels" . | nindent 8 }}
        {{- include "rtdt.web.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.ngcImagePullSecretName }}
      initContainers:
        # Wait for Kit signaling to be available
        - name: wait-for-kit
          image: curlimages/curl:8.5.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kit to be ready..."
              until curl -s --max-time 5 http://{{ include "rtdt.fullname" . }}-kit:{{ .Values.kit.ports.signaling }}/ > /dev/null 2>&1; do
                echo "  Kit not ready yet, retrying in 10s..."
                sleep 10
              done
              echo "Kit is ready."
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "rtdt.fullname" . }}-nginx-config
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
