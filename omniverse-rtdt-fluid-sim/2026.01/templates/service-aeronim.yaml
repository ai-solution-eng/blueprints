apiVersion: v1
kind: Service
metadata:
  name: {{ include "rtdt.fullname" . }}-aeronim
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
    {{- include "rtdt.aeronim.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "rtdt.aeronim.selectorLabels" . | nindent 4 }}
