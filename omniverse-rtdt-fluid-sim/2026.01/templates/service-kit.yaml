# ClusterIP service for internal access (nginx proxy to Kit API/WebSocket).
# Browser WebRTC access uses hostPort directly on the Kit pod.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rtdt.fullname" . }}-kit
  labels:
    {{- include "rtdt.labels" . | nindent 4 }}
    {{- include "rtdt.kit.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kit.ports.signaling }}
      targetPort: {{ .Values.kit.ports.signaling }}
      protocol: TCP
      name: signaling
  selector:
    {{- include "rtdt.kit.selectorLabels" . | nindent 4 }}
